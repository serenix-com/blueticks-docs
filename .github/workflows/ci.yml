name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check openapi-generated content is in sync
        run: |
          if ! git diff --exit-code content/docs/api/; then
            echo "::error::content/docs/api/ has uncommitted changes after build."
            echo "::error::Run 'pnpm run generate:openapi' locally and commit the diff."
            exit 1
          fi
